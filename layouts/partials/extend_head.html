<!-- Sticky ToC: highlight active section on scroll -->
<script>
(function(){
  if(window.innerWidth < 1280) return;
  document.addEventListener('DOMContentLoaded', function(){
    var tocLinks = document.querySelectorAll('.toc a[href^="#"]');
    if(!tocLinks.length) return;
    var headings = Array.from(tocLinks).map(function(a){
      return document.getElementById(a.getAttribute('href').slice(1));
    }).filter(Boolean);
    var active = null;
    function update(){
      var found = null;
      for(var i = headings.length - 1; i >= 0; i--){
        if(headings[i].getBoundingClientRect().top <= 120){ found = i; break; }
      }
      var idx = found === null ? 0 : found;
      if(active !== idx){
        tocLinks.forEach(function(a){ a.classList.remove('toc-active'); });
        if(tocLinks[idx]) tocLinks[idx].classList.add('toc-active');
        active = idx;
      }
    }
    window.addEventListener('scroll', update, {passive: true});
    update();
    /* Force ToC open on desktop */
    var toc = document.querySelector('.post-single .toc');
    if(toc) toc.setAttribute('open', '');
  });
})();
</script>
