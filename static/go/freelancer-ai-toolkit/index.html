<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting to The Freelancer's AI Toolkit...</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QRQV8QDSRG"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-QRQV8QDSRG', {send_page_view: false});

(function() {
  var dest = "https://solobrief.gumroad.com/l/freelancer-ai-toolkit";
  var slug = "freelancer-ai-toolkit";
  var ref = document.referrer ? new URL(document.referrer).pathname : "direct";
  var articleSlug = ref.replace(/\/$/,"").split("/").pop() || "direct";

  var utmParams = [
    "utm_source=site",
    "utm_medium=product",
    "utm_campaign=" + slug,
    "utm_content=" + articleSlug
  ].join("&");
  var sep = dest.indexOf("?") === -1 ? "?" : "&";
  var finalUrl = dest + sep + utmParams;

  gtag("event", "product_click", {
    product: slug,
    article_slug: articleSlug,
    destination: dest,
    event_callback: function() { window.location.href = finalUrl; }
  });

  setTimeout(function() { window.location.href = finalUrl; }, 400);
})();
</script>
</head>
<body>
<p>Redirecting to <a href="https://solobrief.gumroad.com/l/freelancer-ai-toolkit">The Freelancer's AI Toolkit</a>...</p>
</body>
</html>
